[build]
  publish = "."
  functions = "functions"

[build.environment]
  NODE_VERSION = "22"

# Functions configuration
[functions]
  directory = "functions"

[[redirects]]
  from = "/api/shakespeare"
  to = "/.netlify/functions/shakespeare"
  status = 200

[[redirects]]
  from = "/api/test-shakespeare"
  to = "/.netlify/functions/test-shakespeare"
  status = 200

[[redirects]]
  from = "/api/test-debug"
  to = "/.netlify/functions/test-debug"
  status = 200

[[headers]]
  for = "*.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[edge_functions]]
  function = "variorum-edge"
  path = "/api/variorum-edge"
